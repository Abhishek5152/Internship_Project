{% extends "employee/emp_layout.html" %}

{% block content %}
            <div class="page-content">
                <!-- Page Header-->
                <div class="page-header no-margin-bottom">
                <div class="container-fluid">
                    <h2 class="h5 no-margin-bottom">View Expenses</h2>
                </div>
                </div>
                <!-- Breadcrumb-->
                <div class="container-fluid">
                <ul class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('employee.empdash') }}">Home</a></li>
                    <li class="breadcrumb-item active">View Expenses</li>
                </ul>
                </div>
                <section class="no-padding-top">
                <div class="container-fluid">
                    <div class="row">
                    <div class="col-lg-12">
                        <div class="block">
                        <div class="title"><strong>Expenses</strong></div>
                        <div class="table-responsive"> 
                            <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                <th>Expense Type</th>
                                <th>Amount</th>
                                <th>Description</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Receipt</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for exp in expenses %}
                                <tr>
                                    <td>{{ exp[1] }}</td>  <!-- Exp Type -->
                                    <td>{{ exp[2] }}</td>  <!-- Amount -->
                                    <td>{{ exp[3] }}</td>  <!-- Description -->
                                    <td>{{ exp[4] }}</td>  <!-- Date -->
                                    <td>{{ exp[5] }}</td>  <!-- Status -->
                                    <td><a href="{{ exp[6] }}" target="_blank">View Receipt</a></td>  <!-- Receipt -->
                                </tr>
                                {% endfor %}
                            </tbody>
                            </table>
                        </div>
                        </div>
                    </div>
                    </div>
                    </div>
                </div>
                </section>
{% endblock %}
